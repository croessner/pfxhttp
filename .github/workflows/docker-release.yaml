name: Release Docker Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  OCI_IMAGE_DESCRIPTION: Postfix to HTTP wrapper

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release metadata
        id: release_metadata
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          registry_image="ghcr.io/${{ github.repository_owner }}/pfxhttp"
          prerelease=""
          tag_major=""
          tag_minor=""

          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "${GITHUB_OUTPUT}"

            case "${key}" in
              prerelease)
                prerelease="${value}"
                ;;
              tag_major)
                tag_major="${value}"
                ;;
              tag_minor)
                tag_minor="${value}"
                ;;
            esac
          done < <(./scripts/release-semver-metadata.sh "${RELEASE_TAG}")

          {
            echo 'docker_tags<<EOF'
            echo "${registry_image}:${RELEASE_TAG}"

            if [[ "${prerelease}" != "true" ]]; then
              echo "${registry_image}:latest"
              echo "${registry_image}:${tag_major}"
              echo "${registry_image}:${tag_minor}"
            fi

            echo 'EOF'
            echo 'labels<<EOF'
            echo "org.opencontainers.image.description=${OCI_IMAGE_DESCRIPTION}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.version=${RELEASE_TAG}"
            echo 'EOF'
            echo 'annotations<<EOF'
            echo "index,manifest:org.opencontainers.image.description=${OCI_IMAGE_DESCRIPTION}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.release_metadata.outputs.docker_tags }}
          labels: ${{ steps.release_metadata.outputs.labels }}
          annotations: ${{ steps.release_metadata.outputs.annotations }}
