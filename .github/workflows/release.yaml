name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  APP_NAME: pfxhttp
  MAINTAINER: croessner
  DESC: Postfix to HTTP wrapper
  GOEXPERIMENT: runtimesecret

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Validate release metadata
        run: ./scripts/release-semver-metadata.sh "${GITHUB_REF_NAME}" > /dev/null

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x

      - name: Build binary
        env:
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME}-${GITHUB_SHA:0:8}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -mod=vendor -trimpath -ldflags="-s -w -X main.version=${version}" -o "${{ env.APP_NAME }}" .

      - name: Create artifact
        run: |
          assets="${{ env.APP_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "dist/${assets}/contrib/systemd" "dist/${assets}/man/man5" "dist/${assets}/man/man8"
          cp "${{ env.APP_NAME }}" README.md pfxhttp.yml "dist/${assets}/"
          cp contrib/systemd/pfxhttp.service contrib/systemd/pfxhttp-policy.socket contrib/systemd/pfxhttp@.socket "dist/${assets}/contrib/systemd/"
          cp man/man5/pfxhttp.yml.5 "dist/${assets}/man/man5/"
          cp man/man8/pfxhttp.8 "dist/${assets}/man/man8/"
          (
            cd dist
            tar czf "${assets}.tar.gz" "${assets}"
            ls -lah ./*.tar.gz
          )
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.tar.gz

  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build-artifact
      - build-linux-packages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release_metadata
        run: ./scripts/release-semver-metadata.sh "${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE: ${{ steps.release_metadata.outputs.prerelease }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists."
            exit 0
          fi

          release_args=(
            "${GITHUB_REF_NAME}"
            --repo "${GITHUB_REPOSITORY}"
            --verify-tag
            --generate-notes
          )

          if [[ "${PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease)
          else
            release_args+=(--latest)
          fi

          gh release create "${release_args[@]}"

  upload-release:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    needs:
      - create-release
    strategy:
      fail-fast: false
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: artifact-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist

      - name: Upload Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            "dist/${{ env.APP_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"

  build-linux-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            container_platform: linux/amd64
            deb_arch: amd64
            rpm_arch: x86_64
          - goos: linux
            goarch: arm64
            container_platform: linux/arm64
            deb_arch: arm64
            rpm_arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build binary
        env:
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME}-${GITHUB_SHA:0:8}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -mod=vendor -trimpath -ldflags="-s -w -X main.version=${version}" -o "${{ env.APP_NAME }}" .

      - name: Resolve release metadata
        id: release_metadata
        run: ./scripts/release-semver-metadata.sh "${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build Linux packages
        run: |
          host_uid="$(id -u)"
          host_gid="$(id -g)"
          docker run --rm \
            --platform "${{ matrix.container_platform }}" \
            -e "HOST_UID=${host_uid}" \
            -e "HOST_GID=${host_gid}" \
            -v "${PWD}:/work" \
            -w /work \
            alpine:3.23 \
            sh -c '
              set -e
              apk add --no-cache bash coreutils cpio dpkg rpm
              mkdir -p dist/packages
              ./scripts/build-linux-package.sh \
                --type deb \
                --arch "${{ matrix.deb_arch }}" \
                --version "${{ steps.release_metadata.outputs.package_version }}" \
                --binary "./${{ env.APP_NAME }}" \
                --out-dir dist/packages
              ./scripts/build-linux-package.sh \
                --type rpm \
                --arch "${{ matrix.rpm_arch }}" \
                --version "${{ steps.release_metadata.outputs.package_version }}" \
                --binary "./${{ env.APP_NAME }}" \
                --out-dir dist/packages
              ./scripts/verify-linux-package.sh dist/packages/*.deb dist/packages/*.rpm
              chown -R "${HOST_UID}:${HOST_GID}" dist/packages
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.goos }}-${{ matrix.goarch }}-pkgs
          path: dist/packages/*

      - name: Attest package artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/packages/*

  upload-linux-packages:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    needs:
      - create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            pkg: deb
          - goos: linux
            goarch: amd64
            pkg: rpm
          - goos: linux
            goarch: arm64
            pkg: deb
          - goos: linux
            goarch: arm64
            pkg: rpm
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: artifact-${{ matrix.goos }}-${{ matrix.goarch }}-pkgs
          path: dist

      - name: Select package asset
        run: |
          asset_name="$(find dist -type f -name '*.${{ matrix.pkg }}' -print -quit)"
          if [[ -z "${asset_name}" ]]; then
            echo "No .${{ matrix.pkg }} package asset found in downloaded artifact." >&2
            exit 1
          fi
          echo "ASSET_NAME=${asset_name}" >> "${GITHUB_ENV}"

      - name: Upload Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            "${ASSET_NAME}"
