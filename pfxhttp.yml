---
# pfxhttp config file

server:

  run_as_user: "pfxhttp"
  run_as_group: "pfxhttp"
  # chroot: "/var/lib/pfxhttp"

  listen:
    - kind: "socket_map"
      name: "map"
      type: "tcp"
      address: "0.0.0.0"
      port: 23450

    - kind: "policy_service"
      name: "policy"
      type: "tcp"
      address: "0.0.0.0"
      port: 23451
      # Optional. When set, pfxhttp consumes a systemd-activated listener with
      # this FileDescriptorName instead of creating the socket itself.
      # systemd_socket_name: "policy"

    - kind: "policy_service"
      name: "oidc_policy"
      type: "tcp"
      address: "0.0.0.0"
      port: 23452

    - kind: "dovecot_sasl"
      name: "dovecot_sasl"
      type: "tcp"
      address: "0.0.0.0"
      port: 23453

  logging:
    json: false
    level: debug

  http_client:
    timeout: 30s
    max_connections_per_host: 10
    max_idle_connections: 4
    max_idle_connections_per_host: 1
    idle_connection_timeout: 10s
    # proxy: "http://proxy.example.com:8080"

  tls:
    enabled: true
    skip_verify: true
    # root_ca: "/etc/ssl/certs/ca-certificates.crt"

  # Default Postfix limit
  socketmap_max_reply_size: 100000

  response_cache:
    enabled: true
    ttl: 1m

  worker_pool:
    max_workers: 10
    max_queue: 100

  observability:
    # All observability features are opt-in.
    prometheus_enabled: false
    prometheus_address: 127.0.0.1
    prometheus_port: 9464
    prometheus_path: /metrics
    prometheus_runtime_metrics: false
    # Optional incoming Basic auth for the Prometheus endpoint.
    # prometheus_http_auth_basic: "metrics:change-me"
    # Optional server-side TLS for the Prometheus endpoint.
    prometheus_tls:
      enabled: false
      # cert: /etc/pfxhttp/metrics.crt
      # key: /etc/pfxhttp/metrics.key
      min_tls_version: "1.2"
    otel_enabled: false
    otel_traces_enabled: false
    otel_metrics_enabled: false
    otel_service_name: pfxhttp
    # Defaults to the binary version when omitted.
    # otel_service_version: ""
    # Required when otel_enabled is true.
    # otel_exporter_otlp_endpoint: http://127.0.0.1:4318
    # otel_exporter_otlp_headers:
    #   authorization: "Bearer token"
    otel_exporter_otlp_insecure: false
    otel_sample_ratio: 1.0

socket_maps:

  demo:
    target: https://127.0.0.1:9443/api/v1/custom/postfix/socket_map
    http_request_compression: true
    http_response_compression: true
    custom_headers:
      # User 'test', password 'test'
      - "Authorization: Basic dGVzdDp0ZXN0"
    payload: >
      {
        "key": "{{ .Key }}"
      }
    status_code: 200
    value_field: "demo_value"
    error_field: "error"
    no_error_value: "none"

  oidc_demo:
    target: https://127.0.0.1:9443/api/v1/custom/postfix/socket_map
    oidc_auth:
      enabled: true
      configuration_uri: https://127.0.0.1:9443/.well-known/openid-configuration
      client_id: admin
      client_secret: admin-password
    payload: >
      {
        "key": "{{ .Key }}"
      }
    status_code: 200
    value_field: "demo_value"
    error_field: "error"
    no_error_value: "none"

policy_services:

  policy:
    target: https://127.0.0.1:9443/api/v1/custom/postfix/policy_service
    http_request_compression: false
    http_response_compression: true
    custom_headers:
      # User 'test', password 'test'
      - "Authorization: Basic dGVzdDp0ZXN0"
    payload: "{{ .Key }}"
    status_code: 200
    value_field: "result"
    error_field: "error"
    no_error_value: "none"

  oidc_policy:
    target: https://127.0.0.1:9443/api/v1/custom/postfix/policy_service
    oidc_auth:
      enabled: true
      configuration_uri: https://127.0.0.1:9443/.well-known/openid-configuration
      client_id: admin
      client_secret: admin-password
    payload: "{{ .Key }}"
    status_code: 200
    value_field: "result"
    error_field: "error"
    no_error_value: "none"

dovecot_sasl:

  dovecot_sasl:
    target: https://127.0.0.1:9443/api/v1/auth/json
    oidc_auth:
      enabled: true
      configuration_uri: https://127.0.0.1:9443/.well-known/openid-configuration
      client_id: admin
      client_secret: admin-password
      # account_claim: "dovecot_account"
    # Note: For dovecot_sasl, the payload is generated internally according to Nauthilus
    # /api/v1/auth/json; a payload entry has no effect here.
    status_code: 200
    # Username is returned via HTTP response header "Auth-User" by the backend.
    # Errors are signaled via HTTP status and the "Auth-Status" header.

  dovecot_sasl_grpc:
    transport: grpc
    http_auth_basic: admin:admin-password
    default_local_port: "587"
    grpc:
      address: 127.0.0.1:9444
      timeout: 5s
      metadata:
        accept-language:
          - de
      tls:
        enabled: false
        # root_ca: /etc/pfxhttp/nauthilus-ca.pem
        # server_name: nauthilus.example.org
        min_tls_version: "1.2"
        skip_verify: false
